<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dummy Voice Config Builder</title>
	<style>
		:root {
			--bg: #fafafa;
			--panel: #ffffff;
			--border: #e4e4e7;
			--text: #18181b;
			--muted: #71717a;
			--subtle: #f4f4f5;
			--accent: #2563eb;
			--accent-hover: #1d4ed8;
			--danger: #dc2626;
			--danger-hover: #b91c1c;
			--danger-bg: #fef2f2;
			--success: #16a34a;
		}

		* { box-sizing: border-box; }

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: var(--bg);
			color: var(--text);
			margin: 0;
			padding: 24px;
			line-height: 1.5;
		}

		.container { max-width: 840px; margin: 0 auto; }

		h1 { margin: 0 0 4px 0; font-size: 24px; }

		.subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }

		.panel {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 16px;
			margin-bottom: 16px;
		}

		.panel h2 {
			margin: 0 0 4px 0;
			font-size: 16px;
			font-weight: 600;
		}

		.panel-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			margin-bottom: 8px;
		}

		.panel-header h2 { margin: 0; }

		button.settings-icon {
			background: transparent;
			color: var(--muted);
			border: none;
			padding: 4px;
			border-radius: 6px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
		}

		button.settings-icon svg {
			display: block;
			width: 20px;
			height: 20px;
		}

		button.settings-icon:hover {
			background: var(--subtle);
			color: var(--text);
		}

		.modal-backdrop {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.4);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 100;
			padding: 16px;
		}

		.modal {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 20px;
			width: 100%;
			max-width: 420px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
		}

		.modal h3 {
			margin: 0 0 12px 0;
			font-size: 16px;
			font-weight: 600;
		}

		.modal-field { margin-bottom: 12px; }

		.modal-actions {
			display: flex;
			justify-content: flex-end;
			gap: 8px;
			margin-top: 16px;
		}

		.panel-hint {
			font-size: 12px;
			color: var(--muted);
			margin-bottom: 12px;
		}

		label {
			display: block;
			font-size: 13px;
			color: var(--text);
			margin-bottom: 2px;
			font-weight: 500;
		}

		.label-hint {
			display: block;
			font-size: 12px;
			color: var(--muted);
			margin-bottom: 4px;
			font-weight: 400;
		}

		input[type="text"], input[type="number"], textarea, select {
			width: 100%;
			padding: 8px 10px;
			border: 1px solid var(--border);
			border-radius: 6px;
			font-size: 14px;
			font-family: inherit;
			background: #fff;
			color: var(--text);
		}

		select { padding-right: 32px; }

		textarea {
			resize: vertical;
			font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
			font-size: 12px;
		}

		input:focus, textarea:focus, select:focus {
			outline: 2px solid var(--accent);
			outline-offset: -1px;
			border-color: var(--accent);
		}

		input.invalid { border-color: var(--danger); }

		.field-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 12px;
			margin-bottom: 16px;
		}

		.phrases-subtitle {
			font-size: 14px;
			font-weight: 600;
			margin: 8px 0 2px 0;
		}

		.phrases-hint {
			font-size: 12px;
			color: var(--muted);
			margin-bottom: 10px;
		}

		.phrase-header {
			display: grid;
			grid-template-columns: 160px 1fr 36px;
			gap: 8px;
			padding: 0 2px;
			margin-bottom: 4px;
		}

		.phrase-header span {
			font-size: 11px;
			color: var(--muted);
			font-weight: 500;
			text-transform: uppercase;
			letter-spacing: 0.03em;
		}

		.phrase-row {
			display: grid;
			grid-template-columns: 160px 1fr 36px;
			gap: 8px;
			margin-bottom: 8px;
			align-items: start;
		}

		.phrase-row input { font-size: 13px; }

		button {
			padding: 8px 14px;
			border: 1px solid transparent;
			border-radius: 6px;
			background: var(--accent);
			color: #fff;
			font-size: 13px;
			font-weight: 500;
			cursor: pointer;
			font-family: inherit;
		}

		button:hover { background: var(--accent-hover); }

		button.secondary {
			background: #fff;
			color: var(--text);
			border-color: var(--border);
		}

		button.secondary:hover { background: var(--subtle); }

		button.danger-icon {
			background: transparent;
			color: var(--danger);
			border: 1px solid transparent;
			padding: 6px 0;
			width: 36px;
		}

		button.danger-icon:hover {
			color: var(--danger-hover);
			background: var(--danger-bg);
			border-color: #fecaca;
		}

		.add-btn {
			margin-top: 4px;
			background: #fff;
			color: var(--accent);
			border-color: var(--border);
		}

		.add-btn:hover { background: #eff6ff; }

		.actions {
			display: flex;
			gap: 8px;
			align-items: center;
			margin-top: 12px;
			flex-wrap: wrap;
		}

		.status {
			font-size: 13px;
			color: var(--success);
			opacity: 0;
			transition: opacity 0.2s;
		}

		.status.visible { opacity: 1; }

		.status.error { color: var(--danger); }

		.errors-panel {
			background: var(--danger-bg);
			border: 1px solid #fecaca;
			border-radius: 8px;
			padding: 14px 16px;
			margin-bottom: 16px;
			color: var(--danger-hover);
		}

		.errors-panel h3 {
			margin: 0 0 8px 0;
			font-size: 14px;
		}

		.errors-panel ul {
			margin: 0;
			padding-left: 18px;
			font-size: 13px;
		}

		.errors-panel li { margin-bottom: 2px; }

		.hidden { display: none; }

		code {
			background: var(--subtle);
			padding: 1px 5px;
			border-radius: 3px;
			font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
			font-size: 12px;
		}
	</style>
</head>
<body>
<div class="container">
	<h1>Dummy Voice Config Builder</h1>

	<div class="panel">
		<label for="language">Language</label>
		<select id="language"></select>
	</div>

	<div id="modes"></div>

	<div id="errors-container" class="errors-panel hidden">
		<h3>Fix these before generating the config:</h3>
		<ul id="errors-list"></ul>
	</div>

	<div id="settings-modal" class="modal-backdrop hidden">
		<div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
			<h3 id="settings-title">Settings</h3>
			<div class="modal-field">
				<label for="settings-start-speaking">Start-speaking message delay (ms)</label>
				<input id="settings-start-speaking" type="number" min="0">
			</div>
			<div class="modal-field">
				<label for="settings-listening">Listening message delay (ms)</label>
				<input id="settings-listening" type="number" min="0">
			</div>
			<div class="modal-actions">
				<button class="secondary" id="settings-cancel">Cancel</button>
				<button id="settings-ok">OK</button>
			</div>
		</div>
	</div>

	<div id="output-panel" class="panel hidden">
		<h2>Generated config</h2>
		<textarea id="json-output" rows="14" readonly></textarea>
		<div class="actions">
			<button class="secondary" id="copy-json">Copy JSON</button>
			<button class="secondary" id="copy-link">Copy appconfig link</button>
			<button id="set-appconfig">Set to appconfig</button>
			<span class="status" id="output-status"></span>
		</div>
	</div>
</div>

<script>
	const DEFAULT_START_SPEAKING_MESSAGE_DELAY = 200;
	const DEFAULT_LISTENING_MESSAGE_DELAY = 600;
	const DEFAULT_PHRASE_DELAY = 1000;
	const CONFIG_KEY = 'dummy_voice_config_json';
	const STATE_STORAGE_KEY = 'dummy_voice_config_state';

	const MODES = [
		{ key: 'native', label: 'Native' },
		{ key: 'english', label: 'English' },
		{ key: 'romanized', label: 'Romanized' },
	];

	// Mirrors KeyboardFlavors.kt — keep in sync if a flavor is added/renamed.
	const LANGUAGES = [
		'malayalam', 'hindi', 'amharic', 'bangla', 'chinese', 'gujarati',
		'japanese', 'kannada', 'marathi', 'nepali', 'odia', 'punjabi',
		'russian', 'sanskrit', 'sinhala', 'tamil', 'telugu', 'tigrinya',
		'urdu', 'vietnamese', 'arabic',
	];

	const state = {
		language: 'malayalam',
	};
	MODES.forEach(m => {
		state[m.key] = {
			startSpeakingMessageDelay: DEFAULT_START_SPEAKING_MESSAGE_DELAY,
			listeningMessageDelay: DEFAULT_LISTENING_MESSAGE_DELAY,
			phrases: [{ delay: DEFAULT_PHRASE_DELAY, fieldText: '' }],
		};
	});

	const modesContainer = document.getElementById('modes');
	const jsonOutput = document.getElementById('json-output');
	const languageSelect = document.getElementById('language');
	const errorsContainer = document.getElementById('errors-container');
	const errorsList = document.getElementById('errors-list');
	const outputPanel = document.getElementById('output-panel');

	function populateLanguages() {
		LANGUAGES.forEach(lang => {
			languageSelect.appendChild(el('option', { value: lang }, [document.createTextNode(capitalize(lang))]));
		});
		languageSelect.addEventListener('change', () => {
			state.language = languageSelect.value;
			refresh();
		});
	}

	function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

	function render() {
		modesContainer.innerHTML = '';
		MODES.forEach(mode => modesContainer.appendChild(renderMode(mode)));
		refresh();
	}

	function renderMode(mode) {
		const panel = el('div', { class: 'panel' });

		const header = el('div', { class: 'panel-header' });
		header.appendChild(el('h2', {}, [document.createTextNode(mode.label)]));
		const settingsBtn = el('button', {
			class: 'settings-icon',
			type: 'button',
			title: 'Delay settings',
			'aria-label': `${mode.label} delay settings`,
		}, []);
		settingsBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94 0 .31.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>';
		settingsBtn.addEventListener('click', () => openSettingsDialog(mode));
		header.appendChild(settingsBtn);
		panel.appendChild(header);

		const s = state[mode.key];

		panel.appendChild(el('div', { class: 'phrases-subtitle' }, [document.createTextNode('Phrases')]));

		const phraseHeader = el('div', { class: 'phrase-header' });
		phraseHeader.appendChild(el('span', {}, [document.createTextNode('Duration (ms)')]));
		phraseHeader.appendChild(el('span', {}, [document.createTextNode('Text')]));
		phraseHeader.appendChild(el('span', {}, []));
		panel.appendChild(phraseHeader);

		const list = el('div', {});
		s.phrases.forEach((_, i) => list.appendChild(renderPhraseRow(mode.key, i)));
		panel.appendChild(list);

		const addBtn = el('button', { class: 'add-btn' }, [document.createTextNode('+ Add phrase')]);
		addBtn.addEventListener('click', () => {
			s.phrases.push({ delay: DEFAULT_PHRASE_DELAY, fieldText: '' });
			render();
		});
		panel.appendChild(addBtn);

		return panel;
	}

	function renderPhraseRow(modeKey, index) {
		const s = state[modeKey];
		const p = s.phrases[index];
		const row = el('div', { class: 'phrase-row' });

		const delayInput = el('input', {
			type: 'number', min: '0',
			value: String(p.delay),
			placeholder: 'Time before showing this phrase',
			title: 'Time before showing this phrase (ms)',
		});
		delayInput.addEventListener('input', () => {
			const v = parseInt(delayInput.value, 10);
			p.delay = Number.isFinite(v) ? v : NaN;
			refresh();
		});
		row.appendChild(delayInput);

		const textInput = el('input', {
			type: 'text',
			value: p.fieldText,
			placeholder: 'What appears in the text field',
			title: 'Text that appears as a partial result',
		});
		textInput.addEventListener('input', () => {
			p.fieldText = textInput.value;
			refresh();
		});
		row.appendChild(textInput);

		const removeBtn = el('button', { class: 'danger-icon', title: 'Remove phrase' }, [document.createTextNode('✕')]);
		removeBtn.addEventListener('click', () => {
			if (s.phrases.length === 1) {
				s.phrases[0] = { delay: DEFAULT_PHRASE_DELAY, fieldText: '' };
			} else {
				s.phrases.splice(index, 1);
			}
			render();
		});
		row.appendChild(removeBtn);

		return row;
	}

	const settingsModal = document.getElementById('settings-modal');
	const settingsTitle = document.getElementById('settings-title');
	const settingsStartSpeakingInput = document.getElementById('settings-start-speaking');
	const settingsListeningInput = document.getElementById('settings-listening');
	let settingsModeKey = null;

	function openSettingsDialog(mode) {
		settingsModeKey = mode.key;
		const s = state[mode.key];
		settingsTitle.textContent = `${mode.label} delay settings`;
		settingsStartSpeakingInput.value = Number.isFinite(s.startSpeakingMessageDelay) ? String(s.startSpeakingMessageDelay) : '';
		settingsListeningInput.value = Number.isFinite(s.listeningMessageDelay) ? String(s.listeningMessageDelay) : '';
		settingsModal.classList.remove('hidden');
		settingsStartSpeakingInput.focus();
	}

	function closeSettingsDialog() {
		settingsModal.classList.add('hidden');
		settingsModeKey = null;
	}

	function applySettingsDialog() {
		if (!settingsModeKey) return;
		const s = state[settingsModeKey];
		const startV = parseInt(settingsStartSpeakingInput.value, 10);
		const listenV = parseInt(settingsListeningInput.value, 10);
		s.startSpeakingMessageDelay = Number.isFinite(startV) ? startV : NaN;
		s.listeningMessageDelay = Number.isFinite(listenV) ? listenV : NaN;
		closeSettingsDialog();
		refresh();
	}

	document.getElementById('settings-ok').addEventListener('click', applySettingsDialog);
	document.getElementById('settings-cancel').addEventListener('click', closeSettingsDialog);
	settingsModal.addEventListener('click', (e) => {
		if (e.target === settingsModal) closeSettingsDialog();
	});
	document.addEventListener('keydown', (e) => {
		if (e.key === 'Escape' && !settingsModal.classList.contains('hidden')) closeSettingsDialog();
	});

	function saveState() {
		try {
			localStorage.setItem(STATE_STORAGE_KEY, JSON.stringify(state));
		} catch (e) {
			// Storage unavailable or quota exceeded — skip.
		}
	}

	function loadState() {
		let parsed;
		try {
			const raw = localStorage.getItem(STATE_STORAGE_KEY);
			if (!raw) return false;
			parsed = JSON.parse(raw);
		} catch (e) {
			return false;
		}
		if (!parsed || typeof parsed !== 'object') return false;
		if (typeof parsed.language !== 'string' || !LANGUAGES.includes(parsed.language)) return false;
		for (const mode of MODES) {
			const m = parsed[mode.key];
			if (!m || typeof m !== 'object') return false;
			if (typeof m.startSpeakingMessageDelay !== 'number') return false;
			if (typeof m.listeningMessageDelay !== 'number') return false;
			if (!Array.isArray(m.phrases) || m.phrases.length === 0) return false;
			for (const p of m.phrases) {
				if (!p || typeof p !== 'object') return false;
				if (typeof p.delay !== 'number') return false;
				if (typeof p.fieldText !== 'string') return false;
			}
		}
		state.language = parsed.language;
		MODES.forEach(mode => {
			const m = parsed[mode.key];
			state[mode.key] = {
				startSpeakingMessageDelay: m.startSpeakingMessageDelay,
				listeningMessageDelay: m.listeningMessageDelay,
				phrases: m.phrases.map(p => ({ delay: p.delay, fieldText: p.fieldText })),
			};
		});
		return true;
	}

	function el(tag, attrs, children) {
		const node = document.createElement(tag);
		if (attrs) {
			for (const k in attrs) node.setAttribute(k, attrs[k]);
		}
		if (children) children.forEach(c => node.appendChild(c));
		return node;
	}

	function validate() {
		const errors = [];
		if (!state.language) {
			errors.push('Select a language.');
		}
		MODES.forEach(mode => {
			const s = state[mode.key];
			if (!Number.isFinite(s.startSpeakingMessageDelay) || s.startSpeakingMessageDelay < 0) {
				errors.push(`${mode.label}: start-speaking message delay must be 0 or more.`);
			}
			if (!Number.isFinite(s.listeningMessageDelay) || s.listeningMessageDelay < 0) {
				errors.push(`${mode.label}: listening message delay must be 0 or more.`);
			}
			const hasText = s.phrases.some(p => p.fieldText && p.fieldText.trim().length > 0);
			if (!hasText) {
				errors.push(`${mode.label}: add at least one phrase with text.`);
			}
			s.phrases.forEach((p, i) => {
				const textTrimmed = (p.fieldText || '').trim();
				if (textTrimmed.length === 0) {
					errors.push(`${mode.label}: phrase #${i + 1} is missing text.`);
				}
				if (!Number.isFinite(p.delay) || p.delay < 0) {
					errors.push(`${mode.label}: phrase #${i + 1} duration must be 0 or more.`);
				}
			});
		});
		return errors;
	}

	function buildJsonObject() {
		const out = {};
		MODES.forEach(mode => {
			const s = state[mode.key];
			const phrases = s.phrases
				.filter(p => p.fieldText && p.fieldText.trim().length > 0)
				.map(p => ({ delay: p.delay, field_text: p.fieldText }));
			out[mode.key] = {
				start_speaking_message_delay: s.startSpeakingMessageDelay,
				listening_message_delay: s.listeningMessageDelay,
				phrases: phrases,
			};
		});
		return out;
	}

	function refresh() {
		saveState();
		const errors = validate();
		if (errors.length > 0) {
			errorsList.innerHTML = '';
			errors.forEach(e => errorsList.appendChild(el('li', {}, [document.createTextNode(e)])));
			errorsContainer.classList.remove('hidden');
			outputPanel.classList.add('hidden');
			return;
		}
		errorsContainer.classList.add('hidden');
		outputPanel.classList.remove('hidden');
		jsonOutput.value = JSON.stringify(buildJsonObject(), null, 2);
	}

	function showStatus(text, isError) {
		const node = document.getElementById('output-status');
		node.textContent = text;
		node.classList.toggle('error', !!isError);
		node.classList.add('visible');
		clearTimeout(node._timer);
		node._timer = setTimeout(() => node.classList.remove('visible'), 2500);
	}

	async function copyText(text) {
		try {
			await navigator.clipboard.writeText(text);
			showStatus('Copied', false);
		} catch (e) {
			showStatus('Copy failed', true);
		}
	}

	document.getElementById('copy-json').addEventListener('click', () => {
		copyText(jsonOutput.value);
	});

	function buildAppConfigUrl() {
		const json = JSON.stringify(buildJsonObject());
		const flavor = encodeURIComponent(state.language);
		return `https://desh.app/${flavor}/appconfig?${CONFIG_KEY}=${encodeURIComponent(json)}`;
	}

	document.getElementById('copy-link').addEventListener('click', () => {
		copyText(buildAppConfigUrl());
	});

	document.getElementById('set-appconfig').addEventListener('click', () => {
		window.open(buildAppConfigUrl(), '_blank', 'noopener');
	});

	loadState();

	(function prefillLanguage() {
		const params = new URLSearchParams(window.location.search);
		const lang = params.get('language');
		if (lang && LANGUAGES.includes(lang)) {
			state.language = lang;
		}
	})();

	populateLanguages();
	if (state.language) languageSelect.value = state.language;
	render();
</script>
</body>
</html>

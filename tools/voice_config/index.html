<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dummy Voice Config Builder</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
	<script src="app.js" defer></script>
</head>
<body>
<div class="container">
	<h1>Dummy Voice Config Builder</h1>

	<div class="panel">
		<label for="language">Language</label>
		<select id="language"></select>
	</div>

	<div id="modes"></div>

	<div id="errors-container" class="errors-panel hidden">
		<h3>Fix these before generating the config:</h3>
		<ul id="errors-list"></ul>
	</div>

	<div id="settings-modal" class="modal-backdrop hidden">
		<div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
			<h3 id="settings-title">Settings</h3>
			<div class="modal-field">
				<label for="settings-start-speaking">Start-speaking message delay (ms)</label>
				<input id="settings-start-speaking" type="number" min="0">
			</div>
			<div class="modal-field">
				<label for="settings-listening">Listening message delay (ms)</label>
				<input id="settings-listening" type="number" min="0">
			</div>
			<div class="modal-actions">
				<button class="secondary" id="settings-cancel" type="button">Cancel</button>
				<button id="settings-ok" type="button">OK</button>
			</div>
		</div>
	</div>

	<div id="output-panel" class="panel hidden">
		<h2>Generated config</h2>
		<textarea id="json-output" rows="14" readonly></textarea>
		<div class="actions">
			<button class="secondary" id="copy-json" type="button">Copy JSON</button>
			<button class="secondary" id="copy-link" type="button">Copy appconfig link</button>
			<button id="set-appconfig" type="button">Set to appconfig</button>
			<span class="status" id="output-status"></span>
		</div>
	</div>
</div>
</body>
</html>
